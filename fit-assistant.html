<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fit Assistant | Nordisk Sartoria</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
  <header class="topbar">
    <div class="logo">
      <a href="/index.html" style="color:inherit;text-decoration:none;">Nordisk Sartoria</a>
    </div>

    <nav>
      <ul class="nav-links">
        <li><a href="/index.html#collection">Collection</a></li>
        <li><a href="/account.html">Account</a></li>
        <li><a href="/cart.html">Cart</a></li>
      </ul>
    </nav>
  </header>

  <main class="page-container">
    <section class="card">
      <h1>Fit Assistant</h1>

      <p>
        Enter your model type, height, weight and preferred fit. The assistant will recommend a suit size between 40 and 50.
      </p>

      <div class="form-group">
        <label for="modelType">Model</label>
        <select id="modelType">
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>

      <div class="form-group">
        <label for="fitStyle">Preferred fit</label>
        <select id="fitStyle">
          <option value="slim">Slim fit</option>
          <option value="regular">Regular fit</option>
          <option value="tailored">Tailored fit</option>
        </select>
      </div>

      <div class="form-group">
        <label for="height">Height</label>
        <input type="number" id="height" placeholder="Example: 180">
      </div>

      <div class="form-group">
        <label for="weight">Weight</label>
        <input type="number" id="weight" placeholder="Example: 75">
      </div>

      <button id="recommendBtn" class="btn-dark">
        Get Recommendation
      </button>

      <p id="fitResult" class="space-top"></p>
    </section>
  </main>

  <script>
    const button = document.getElementById("recommendBtn");

    button.addEventListener("click", function () {
      const modelType = document.getElementById("modelType").value;
      const fitStyle = document.getElementById("fitStyle").value;
      const height = Number(document.getElementById("height").value);
      const weight = Number(document.getElementById("weight").value);
      const result = document.getElementById("fitResult");

      if (!height || !weight) {
        result.textContent = "Please enter both height and weight.";
        result.style.color = "#9b1c1c";
        return;
      }

      let size;

      if (modelType === "male") {
        if (weight < 60) {
          size = 40;
        } else if (weight < 67) {
          size = 42;
        } else if (weight < 74) {
          size = 44;
        } else if (weight < 82) {
          size = 46;
        } else if (weight < 90) {
          size = 48;
        } else {
          size = 50;
        }

        if (height > 185 && size < 50) {
          size += 2;
        }

      } else {
        if (weight < 50) {
          size = 40;
        } else if (weight < 57) {
          size = 42;
        } else if (weight < 64) {
          size = 44;
        } else if (weight < 72) {
          size = 46;
        } else if (weight < 80) {
          size = 48;
        } else {
          size = 50;
        }

        if (height > 175 && size < 50) {
          size += 2;
        }
      }

      if (fitStyle === "slim" && size > 40) {
        size -= 2;
      }

      if (fitStyle === "tailored" && size < 50) {
        size += 2;
      }

      if (size < 40) {
        size = 40;
      }

      if (size > 50) {
        size = 50;
      }

      result.innerHTML = `
        Recommended size: <strong>${size}</strong><br>
        Model: <strong>${modelType}</strong><br>
        Preferred fit: <strong>${fitStyle}</strong>
      `;

      result.style.color = "green";
    });
  </script>
</body>
</html>
