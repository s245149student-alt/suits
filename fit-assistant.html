<script>
  function showFitResult() {
    const bodyShape = document.getElementById("body-shape").value;
    const fitStyle = document.getElementById("fit-style").value;
    const height = Number(document.getElementById("height").value);
    const weight = Number(document.getElementById("weight").value);
    const result = document.getElementById("fit-result");

    if (!bodyShape || !fitStyle || !height || !weight) {
      result.innerHTML = "Please choose body shape, preferred fit, height and weight.";
      return;
    }

    let size;

    if (weight < 60) {
      size = 40;
    } else if (weight < 67) {
      size = 42;
    } else if (weight < 74) {
      size = 44;
    } else if (weight < 82) {
      size = 46;
    } else if (weight < 90) {
      size = 48;
    } else {
      size = 50;
    }

    if (height > 185 && size < 50) {
      size += 2;
    }

    if (bodyShape === "broad" && size < 50) {
      size += 2;
    }

    if (fitStyle === "slim-fit" && size > 40) {
      size -= 2;
    }

    if (size < 40) {
      size = 40;
    }

    if (size > 50) {
      size = 50;
    }

    result.innerHTML = `
      Recommended size: <strong>${size}</strong><br>
      Recommended fit: <strong>${fitStyle.replace("-", " ")}</strong>
    `;
  }

  <script>
    function showFitResult() {
      const bodyShape = document.getElementById("body-shape").value;
      const fitStyle = document.getElementById("fit-style").value;
      const result = document.getElementById("fit-result");

      if (!bodyShape || !fitStyle) {
        result.innerHTML = "Please choose both body shape and preferred fit.";
        return;
      }

      if (fitStyle === "slim-fit") {
        result.innerHTML = "Recommendation: Choose a slim fit suit for a sharp and modern silhouette.";
      } else if (fitStyle === "regular-fit") {
        result.innerHTML = "Recommendation: Choose a regular fit suit for more comfort and movement.";
      } else if (fitStyle === "tailored-fit") {
        result.innerHTML = "Recommendation: Choose a tailored fit suit for a balanced and elegant look.";
      }
    }
  </script>
