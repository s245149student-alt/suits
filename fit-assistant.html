<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fit Assistant | Nordisk Sartoria</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <nav>
      <h1>Nordisk Sartoria</h1>
      <a href="index.html">Home</a>
      <a href="account.html">Account</a>
      <a href="cart.html">Cart</a>
    </nav>
  </header>

  <main class="fit-assistant-page">

    <section class="fit-box">
      <h2>Fit Assistant</h2>
      <p>
        Answer a few simple questions to find the suit fit that matches your body type,
        style preference, and comfort needs.
      </p>

      <form class="fit-form">

        <label for="body-shape">Body shape</label>
        <select id="body-shape" name="body-shape">
          <option value="">Choose body shape</option>
          <option value="slim">Slim</option>
          <option value="regular">Regular</option>
          <option value="broad">Broad shoulders</option>
          <option value="athletic">Athletic</option>
        </select>

        <label for="fit-style">Preferred fit</label>
        <select id="fit-style" name="fit-style">
          <option value="">Choose fit</option>
          <option value="slim-fit">Slim fit</option>
          <option value="regular-fit">Regular fit</option>
          <option value="tailored-fit">Tailored fit</option>
        </select>

        <label for="height">Height</label>
        <input type="text" id="height" name="height" placeholder="Example: 180 cm">

        <label for="weight">Weight</label>
        <input type="text" id="weight" name="weight" placeholder="Example: 75 kg">

        <button type="button" class="btn btn-primary" onclick="showFitResult()">
          Get Recommendation
        </button>

      </form>

      <div id="fit-result" class="fit-result"></div>
    </section>

  </main>

  <script>
    function showFitResult() {
      const bodyShape = document.getElementById("body-shape").value;
      const fitStyle = document.getElementById("fit-style").value;
      const result = document.getElementById("fit-result");

      if (!bodyShape || !fitStyle) {
        result.innerHTML = "Please choose both body shape and preferred fit.";
        return;
      }

      if (fitStyle === "slim-fit") {
        result.innerHTML = "Recommendation: Choose a slim fit suit for a sharp and modern silhouette.";
      } else if (fitStyle === "regular-fit") {
        result.innerHTML = "Recommendation: Choose a regular fit suit for more comfort and movement.";
      } else if (fitStyle === "tailored-fit") {
        result.innerHTML = "Recommendation: Choose a tailored fit suit for a balanced and elegant look.";
      }
    }
  </script>

</body>
</html>
