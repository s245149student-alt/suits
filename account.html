<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account | Nordisk Sartoria</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="logo">
      <a href="index.html" style="color:inherit;text-decoration:none;">Nordisk Sartoria</a>
    </div>

    <nav>
      <ul class="nav-links">
        <li><a href="index.html#collection">Collection</a></li>
        <li><a href="account.html">Account</a></li>
        <li><a href="cart.html">Cart</a></li>
      </ul>
    </nav>
  </header>

  <main class="page-container two-col">
    <section class="card">
      <h1>My Account</h1>

      <form id="profileForm">
        <div class="form-group">
          <label for="fullName">Full name</label>
          <input type="text" id="fullName">
        </div>

        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="text" id="phone">
        </div>

        <button class="btn-dark" type="submit">Save Profile</button>
        <p id="profileMessage" class="space-top"></p>
      </form>
    </section>

    <aside class="card">
      <h2>My Orders</h2>
      <ul id="ordersList" class="list-clean"></ul>
    </aside>
  </main>

  <script type="module">
    import { formatPrice } from "./script.js";

    const profileForm = document.getElementById("profileForm");
    const fullName = document.getElementById("fullName");
    const phone = document.getElementById("phone");
    const profileMessage = document.getElementById("profileMessage");
    const ordersList = document.getElementById("ordersList");

    async function loadProfile() {
      try {
        const response = await fetch("/api/profile");
        const result = await response.json();

        if (!response.ok || result.error) {
          profileMessage.textContent = result.error || "Could not load profile.";
          profileMessage.style.color = "#9b1c1c";
          ordersList.innerHTML = "<li>Log in to see your orders.</li>";
          return;
        }

        if (result.profile) {
          fullName.value = result.profile.full_name ?? "";
          phone.value = result.profile.phone ?? "";
        }

        if (!result.orders || !result.orders.length) {
          ordersList.innerHTML = "<li>No orders yet.</li>";
        } else {
          ordersList.innerHTML = result.orders.map((order) => `
            <li>
              <strong>Order #${order.id}</strong><br>
              ${formatPrice(order.total_amount)} — ${order.status}<br>
              <span class="muted">${order.created_at}</span>
            </li>
          `).join("");
        }

      } catch (error) {
        profileMessage.textContent = "Could not connect to backend.";
        profileMessage.style.color = "#9b1c1c";
        console.error(error);
      }
    }

    profileForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      try {
        const response = await fetch("/api/profile", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            full_name: fullName.value.trim(),
            phone: phone.value.trim()
          })
        });

        const result = await response.json();

        if (!response.ok || result.error) {
          profileMessage.textContent = result.error || "Could not save profile.";
          profileMessage.style.color = "#9b1c1c";
          return;
        }

        profileMessage.textContent = "Profile updated.";
        profileMessage.style.color = "green";

      } catch (error) {
        profileMessage.textContent = "Could not connect to backend.";
        profileMessage.style.color = "#9b1c1c";
        console.error(error);
      }
    });

    loadProfile();
  </script>
</body>
</html>
