<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Nordisk Sartoria</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="logo">
      <a href="/index.html" style="color:inherit;text-decoration:none;">Nordisk Sartoria</a>
    </div>

    <nav>
      <ul class="nav-links">
        <li><a href="/index.html#collection">Collection</a></li>
        <li><a href="/account.html">Account</a></li>
        <li><a href="/cart.html">Cart</a></li>
      </ul>
    </nav>
  </header>

  <main class="page-container two-col">
    <section class="card">
      <h1>Your Cart</h1>
      <ul id="cartList" class="list-clean"></ul>
    </section>

    <aside class="card">
      <h2>Summary</h2>
      <p id="cartTotal" class="price">0 DKK</p>
      <button id="checkoutBtn" class="btn-dark">Submit Order</button>
      <p id="cartMessage" class="space-top"></p>
    </aside>
  </main>

  <script type="module">
    import { formatPrice } from "{{ url_for('static', filename='script.js') }}";

    const cartList = document.getElementById("cartList");
    const cartTotal = document.getElementById("cartTotal");
    const cartMessage = document.getElementById("cartMessage");
    const checkoutBtn = document.getElementById("checkoutBtn");

    async function loadCart() {
      try {
        const response = await fetch("/api/cart");
        const items = await response.json();

        if (!response.ok || items.error) {
          cartList.innerHTML = `<li>${items.error || "Could not load cart."}</li>`;
          checkoutBtn.disabled = true;
          return;
        }

        checkoutBtn.disabled = false;

        if (!items.length) {
          cartList.innerHTML = "<li>Your cart is empty.</li>";
          cartTotal.textContent = "0 DKK";
          return;
        }

        let total = 0;

        cartList.innerHTML = items.map((item) => {
          const line = item.quantity * item.product.price;
          total += line;

          return `
            <li>
              <strong>${item.product.name}</strong><br>
              Qty: ${item.quantity} — ${formatPrice(line)}

              <div class="inline-row space-top">
                <button class="btn-dark remove-btn" data-id="${item.id}">
                  Remove
                </button>
              </div>
            </li>
          `;
        }).join("");

        cartTotal.textContent = formatPrice(total);

        document.querySelectorAll(".remove-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            await removeCartItem(btn.dataset.id);
          });
        });

      } catch (error) {
        cartList.innerHTML = "<li>Could not connect to backend.</li>";
        checkoutBtn.disabled = true;
        console.error(error);
      }
    }

    async function removeCartItem(itemId) {
      try {
        const response = await fetch(`/api/cart/${itemId}`, {
          method: "DELETE"
        });

        const result = await response.json();

        if (!response.ok || result.error) {
          cartMessage.textContent = result.error || "Could not remove item.";
          cartMessage.style.color = "#9b1c1c";
          return;
        }

        cartMessage.textContent = "Item removed.";
        cartMessage.style.color = "green";

        loadCart();

      } catch (error) {
        cartMessage.textContent = "Could not remove item.";
        cartMessage.style.color = "#9b1c1c";
        console.error(error);
      }
    }

    checkoutBtn.addEventListener("click", async () => {
      try {
        const response = await fetch("/api/checkout", {
          method: "POST"
        });

        const result = await response.json();

        if (!response.ok || result.error) {
          cartMessage.textContent = result.error || "Checkout failed.";
          cartMessage.style.color = "#9b1c1c";
          return;
        }

        cartMessage.textContent = "Order submitted successfully.";
        cartMessage.style.color = "green";

        loadCart();

      } catch (error) {
        cartMessage.textContent = "Could not connect to backend.";
        cartMessage.style.color = "#9b1c1c";
        console.error(error);
      }
    });

    loadCart();
  </script>
</body>
</html>
